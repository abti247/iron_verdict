<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Verdict — Powerlifting Judging</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <script type="module" src="/static/js/init.js"></script>
    <script defer src="https://umami-production-ca4a.up.railway.app/script.js" data-website-id="aca70c7a-7634-4ae5-bffa-cc83d8764bd0"></script>
    <script
        defer
        src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
        integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh"
        crossorigin="anonymous">
    </script>
    <script
        src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"
        integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU"
        crossorigin="anonymous">
    </script>
</head>
<body x-data="ironVerdictApp()" :class="{ 'display-mode': role === 'display' && screen === 'display' }">

    <!-- Demo Intro Screen -->
    <div class="landing-wrap" x-show="screen === 'demo-intro'">
        <div class="landing-panel cut-corner landing-panel--demo">

            <div class="brand-iron chrome-text">Iron Verdict</div>
            <div class="brand-verdict-sub" x-text="t('demo.guideTitle')"></div>

            <p class="demo-guide-text" x-text="t('demo.intro')"></p>

            <div class="demo-guide-heading" x-text="t('demo.whyTitle')"></div>
            <ul class="demo-guide-list">
                <li><span class="text-em">Athletes</span> — <span x-text="t('demo.athletes')"></span></li>
                <li><span class="text-em">Audience</span> — <span x-text="t('demo.audience')"></span></li>
                <li><span class="text-em">Judges</span> — <span x-text="t('demo.judges')"></span></li>
                <li><span class="text-em">Jury</span> — <span x-text="t('demo.jury')"></span></li>
            </ul>

            <div class="demo-guide-heading" x-text="t('demo.setupTitle')"></div>
            <ol class="demo-guide-list">
                <li x-text="t('demo.setupStep1')"></li>
                <li x-text="t('demo.setupStep2')"></li>
                <li x-text="t('demo.setupStep3')"></li>
            </ol>

            <div class="demo-guide-heading" x-text="t('demo.headControlsTitle')"></div>
            <ul class="demo-guide-list">
                <li x-text="t('demo.showReasonsDesc')"></li>
                <li x-text="t('demo.requireReasonsDesc')"></li>
                <li x-text="t('demo.liftCategoryDesc')"></li>
            </ul>

            <div class="demo-guide-heading" x-text="t('demo.duringTitle')"></div>
            <ol class="demo-guide-list">
                <li x-text="t('demo.duringStep1')"></li>
                <li x-text="t('demo.duringStep2')"></li>
                <li x-text="t('demo.duringStep3')"></li>
                <li x-text="t('demo.duringStep4')"></li>
                <li x-text="t('demo.duringStep5')"></li>
                <li x-text="t('demo.duringStep6')"></li>
            </ol>

            <div x-show="!demoRunning" class="demo-popup-note" x-text="t('demo.popupNote')"></div>

            <div x-show="!demoRunning" class="demo-launch-wrap">
                <button class="btn-blood btn-blood-primary cut-corner-sm" @click="launchDemo()" x-text="t('demo.launchDemo')">
                </button>
            </div>

            <div x-show="demoRunning" class="demo-running-msg" x-text="t('demo.demoRunning')"></div>

            <div class="btn-row">
                <button class="btn-blood btn-blood-ghost" @click="returnToLandingFromDemo()">
                    &larr; <span x-text="t('demo.backToStart')"></span>
                </button>
            </div>

        </div>
    </div>

    <!-- Landing Screen -->
    <div class="landing-wrap" x-show="screen === 'landing'">
        <div class="landing-panel cut-corner">
            <div class="brand-iron chrome-text">Iron Verdict</div>
            <div class="brand-verdict-sub" x-text="t('landing.subtitle')"></div>

            <div class="form-stack">
                <input class="chrome-input" :placeholder="t('landing.placeholder.sessionName')"
                       x-model="newSessionName" @keyup.enter="createSession()">
                <button class="btn-blood btn-blood-primary cut-corner-sm"
                        @click="createSession()" :disabled="!newSessionName.trim()"
                        x-text="t('landing.createSession')">
                </button>

                <div class="slash-divider" x-text="t('landing.or')"></div>

                <input class="chrome-input" :placeholder="t('landing.placeholder.sessionCode')"
                       x-model="joinCode" @keyup.enter="joinExistingSession()">
                <button class="btn-blood btn-blood-secondary cut-corner-sm"
                        @click="joinExistingSession()" :disabled="!joinCode.trim()"
                        x-text="t('landing.joinSession')">
                </button>
            </div>

            <div class="btn-row">
                <button class="btn-blood btn-blood-ghost" @click="startDemo()" x-text="t('landing.startDemo')">
                </button>
            </div>

            <div class="btn-row--sm">
                <button class="btn-blood btn-blood-ghost" @click="goToContact()" x-text="t('landing.contact')">
                </button>
            </div>

            <div class="app-version">
                __APP_VERSION__
            </div>

            <div class="lang-footer">
                <span class="lang-globe">&#127760;</span>
                <template x-for="(lang, idx) in ['en', 'de']" :key="lang">
                    <span>
                        <span x-show="idx > 0" class="lang-sep">|</span>
                        <span class="lang-option"
                              :class="{ 'lang-active': getLanguage() === lang }"
                              @click="setLanguage(lang)"
                              x-text="t('language.' + lang)"></span>
                    </span>
                </template>
            </div>
        </div>
    </div>

    <!-- Contact Screen -->
    <div class="landing-wrap" x-show="screen === 'contact'">
        <div class="landing-panel cut-corner">
            <div class="brand-iron chrome-text" x-text="t('contact.title')"></div>
            <div class="brand-verdict-sub">Iron Verdict</div>

            <form class="form-stack" @submit.prevent="submitContact()" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="2e92ea27-be19-4996-83c9-0b33fcb63419">
                <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

                <div x-show="contactStatus !== 'success'">
                    <div class="form-stack form-stack--no-top">
                        <input class="chrome-input" type="text" name="name" :placeholder="t('contact.name')"
                               x-model="contactName" required>
                        <input class="chrome-input" type="email" name="email" :placeholder="t('contact.email')"
                               x-model="contactEmail">
                        <textarea class="chrome-textarea" name="message" :placeholder="t('contact.message')"
                                  x-model="contactMessage" required></textarea>

                        <button class="btn-blood btn-blood-primary cut-corner-sm"
                                type="submit"
                                :disabled="contactStatus === 'loading' || !contactName.trim() || !contactMessage.trim()"
                                x-text="contactStatus === 'loading' ? t('contact.sending') : t('contact.send')">
                        </button>

                        <div x-show="contactStatus === 'error'" class="contact-error" x-text="t('contact.error')">
                        </div>
                    </div>
                </div>

                <div x-show="contactStatus === 'success'" class="contact-success">
                    <span x-text="t('contact.sent')"></span>
                    <div class="contact-success-sub" x-text="t('contact.sentSub')">
                    </div>
                </div>
            </form>

            <div class="btn-row">
                <button class="btn-blood btn-blood-ghost" @click="screen = 'landing'">
                    &larr; <span x-text="t('contact.back')"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Role Selection Screen -->
    <div class="role-wrap" x-show="screen === 'role-select'">
        <div class="role-panel cut-corner">
            <div class="role-heading chrome-text" x-text="t('roles.heading')"></div>
            <div class="session-tag">
                <span x-text="t('roles.session')"></span> <span class="code" x-text="sessionCode"></span>
            </div>

            <div class="role-qr-wrap">
                <div id="qrcode"></div>
            </div>

            <div class="lang-toggle">
                <template x-for="lang in ['en', 'de']" :key="lang">
                    <button class="lang-toggle-btn"
                            :class="{ active: getLanguage() === lang }"
                            @click="setLanguage(lang)"
                            x-text="lang.toUpperCase()"></button>
                </template>
            </div>

            <div class="role-grid">
                <button class="role-btn cut-corner-sm" @click="joinSession('left_judge')" x-text="t('roles.left')">
                </button>
                <button class="role-btn cut-corner-sm" @click="joinSession('center_judge')" x-text="t('roles.chiefReferee')" style="white-space: pre-line">
                </button>
                <button class="role-btn cut-corner-sm" @click="joinSession('right_judge')" x-text="t('roles.right')">
                </button>
                <button class="role-btn role-display-btn cut-corner-sm" @click="joinSession('display')" x-text="t('roles.display')">
                </button>
            </div>
            <div class="btn-row">
                <button class="btn-blood btn-blood-ghost" @click="returnToLanding()">
                    &larr; <span x-text="t('roles.backToStart')"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Judge Screen -->
    <div class="judge-wrap" x-show="screen === 'judge'">
        <div class="judge-bar">
            <div class="judge-role-label" x-text="getRoleDisplayName()"></div>
            <div class="judge-timer" :class="timerExpired && 'expired'" x-text="timerDisplay"></div>
            <div class="judge-code">
                <span class="conn-dot" :class="connectionStatus"></span>
                <span class="conn-label" x-show="serverRestarting" x-text="t('connection.serverRestarting')"></span>
                <span class="code-link" @click="returnToRoleSelection()" x-text="sessionCode"></span>
            </div>
        </div>

        <div class="vote-grid" x-show="!showingReasonStep" :style="voteLocked ? 'opacity:0.35;pointer-events:none' : ''">
            <button class="vote-btn vote-white cut-corner-sm"
                    :class="selectedVote === 'white' && 'selected'"
                    @click="selectVote('white')" :disabled="voteLocked"
                    x-text="t('judge.colors.white')">
            </button>
            <button class="vote-btn vote-red cut-corner-sm"
                    :class="selectedVote === 'red' && 'selected'"
                    @click="selectVote('red')" :disabled="voteLocked"
                    x-text="t('judge.colors.red')">
            </button>
            <button class="vote-btn vote-blue cut-corner-sm"
                    :class="selectedVote === 'blue' && 'selected'"
                    @click="selectVote('blue')" :disabled="voteLocked"
                    x-text="t('judge.colors.blue')">
            </button>
            <button class="vote-btn vote-yellow cut-corner-sm"
                    :class="selectedVote === 'yellow' && 'selected'"
                    @click="selectVote('yellow')" :disabled="voteLocked"
                    x-text="t('judge.colors.yellow')">
            </button>
        </div>

        <div class="reason-step" x-show="showingReasonStep && !voteLocked">
            <div class="reason-step-header">
                <button class="back-btn" @click="goBackToColorStep()">&#8592; <span x-text="t('judge.back')"></span></button>
                <span class="reason-step-color" :class="selectedVote" x-text="selectedVote ? t('judge.colors.' + selectedVote) : ''"></span>
            </div>
            <div class="reason-list">
                <template x-for="reason in getJudgeReasons()" :key="reason.id">
                    <div class="reason-item"
                         :class="{ selected: selectedReason === reason.id }"
                         @click="selectReason(reason.id)"
                         x-text="reason.label">
                    </div>
                </template>
            </div>
        </div>

        <button class="lock-btn cut-corner-sm"
                x-show="canLockIn() && !voteLocked"
                @click="lockVote()"
                x-text="t('judge.lockIn')">
        </button>

        <div class="locked-status" x-show="voteLocked">
            &#10003; <span x-text="t('judge.voteLocked')"></span> &#8212; <span x-text="selectedVote ? t('judge.colors.' + selectedVote) : ''"></span>
        </div>

        <div class="head-section" x-show="isHead">
            <div class="head-title-row">
                <div class="head-title" x-text="t('judge.headControls')"></div>
                <div class="judge-connectivity-bar">
                    <span class="connectivity-dot" :class="judgeConnected.left ? 'status-connected' : 'status-disconnected'" x-text="t('judge.connectivity.L')"></span>
                    <span class="connectivity-dot" :class="judgeConnected.right ? 'status-connected' : 'status-disconnected'" x-text="t('judge.connectivity.R')"></span>
                </div>
            </div>
            <div class="head-grid">
                <button class="btn-blood btn-blood-primary cut-corner-sm"
                        @click="startTimer()" x-text="t('judge.startTimer')"></button>
                <button class="btn-blood btn-blood-secondary cut-corner-sm"
                        @click="resetTimer()" x-text="t('judge.resetTimer')"></button>
                <button class="btn-blood btn-blood-primary cut-corner-sm"
                        @click="nextLiftGuarded()" x-text="t('judge.nextLift')"></button>
                <button class="btn-blood btn-blood-ghost"
                        @click="confirmEndSession()" x-text="t('judge.endSession')"></button>
            </div>
            <div class="settings-bar">
                <label>
                    <input type="checkbox" x-model="showExplanations" @change="saveSettings()">
                    <span x-text="t('judge.settings.showReasons')"></span>
                </label>
                <label>
                    <input type="checkbox" x-model="requireReasons" @change="saveSettings()">
                    <span x-text="t('judge.settings.requireReasons')"></span>
                </label>
                <select x-model="liftType" @change="saveSettings()">
                    <option value="squat" x-text="t('liftTypes.squat')"></option>
                    <option value="bench" x-text="t('liftTypes.bench')"></option>
                    <option value="deadlift" x-text="t('liftTypes.deadlift')"></option>
                </select>
            </div>
        </div>

        <!-- Judge Results Panel -->
        <div class="head-section" x-show="resultsShown">
            <div class="head-title" x-text="t('judge.results')"></div>
            <div class="judge-results-orbs">
                <div class="judge-result-orb-wrap">
                    <div class="display-orb display-orb--sm" :class="judgeResultVotes.left"></div>
                    <div class="display-orb-reason"
                         x-show="judgeResultReasons.left"
                         x-text="judgeResultReasons.left"></div>
                </div>
                <div class="judge-result-orb-wrap">
                    <div class="display-orb display-orb--sm" :class="judgeResultVotes.center"></div>
                    <div class="display-orb-reason"
                         x-show="judgeResultReasons.center"
                         x-text="judgeResultReasons.center"></div>
                </div>
                <div class="judge-result-orb-wrap">
                    <div class="display-orb display-orb--sm" :class="judgeResultVotes.right"></div>
                    <div class="display-orb-reason"
                         x-show="judgeResultReasons.right"
                         x-text="judgeResultReasons.right"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Display Screen: shows sessionName only — sessionCode intentionally omitted (C3) -->
    <div class="display-full" x-show="screen === 'display'">
        <div class="display-tag">
            <span class="conn-dot" :class="connectionStatus"></span>
            <span class="conn-label" x-show="serverRestarting" x-text="t('connection.serverRestarting')"></span>
            <span x-show="!isDemo" x-text="sessionName"></span>
            <span x-show="isDemo">DEMO</span>
        </div>

        <div class="display-timer-big" :class="timerExpired && 'expired'" x-text="timerDisplay"></div>

        <!-- Vote orbs with reasons -->
        <div class="display-lights" x-show="displayPhase === 'votes' || displayPhase === 'idle'">
            <div class="display-orb-wrap">
                <div class="display-orb" :class="displayVotes.left"></div>
                <div class="display-orb-reason"
                     x-show="displayShowExplanations && displayVotes.left && displayVotes.left !== 'white' && displayReasons.left"
                     x-text="displayReasons.left"></div>
            </div>
            <div class="display-orb-wrap">
                <div class="display-orb" :class="displayVotes.center"></div>
                <div class="display-orb-reason"
                     x-show="displayShowExplanations && displayVotes.center && displayVotes.center !== 'white' && displayReasons.center"
                     x-text="displayReasons.center"></div>
            </div>
            <div class="display-orb-wrap">
                <div class="display-orb" :class="displayVotes.right"></div>
                <div class="display-orb-reason"
                     x-show="displayShowExplanations && displayVotes.right && displayVotes.right !== 'white' && displayReasons.right"
                     x-text="displayReasons.right"></div>
            </div>
        </div>

        <!-- Verdict shown alongside orbs; always in layout to prevent orbs from shifting -->
        <div class="display-verdict-inline" :style="displayPhase !== 'votes' ? 'visibility:hidden' : ''">
            <div class="verdict-stamp"
                 :class="isValidLift() ? 'valid' : 'invalid'"
                 x-text="isValidLift() ? t('verdict.goodLift') : t('verdict.noLift')"></div>
        </div>

        <div class="display-status" x-text="displayStatus || (displayPhase === 'idle' ? t('display.waiting') : '')"></div>
    </div>

</body>
</html>
